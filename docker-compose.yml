services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: backend-app
    image : backend-good
    ports:
      - "${APP_PORT}:3000"
    environment:
      APP_PORT: ${APP_PORT}
      APP_HOST: ${APP_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - mysql
      - redis
    
  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      
    
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-app
    ports: 
      - "8080:80"
    environment:
      PMA_HOST: mysql
  
  redis: 
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
  
volumes:
  mysql-data: